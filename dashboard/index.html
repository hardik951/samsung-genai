<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Samsung GenAI — Mission Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="brand">
    <span class="samsung-mark">SAMSUNG</span>
    <span class="brand-title"><span class="led"></span> GenAI Program — Mission Console</span>
  </div>
  <div class="header-right">
    <div class="updated" id="updated">—</div>
  </div>
</header>

<div class="tabs" id="tabs"></div>

<div class="wrap">
  <div class="stats-bar">
    <div class="stat">
      <div class="num" id="stat-submitted">–</div>
      <div class="label">Submitted</div>
    </div>
    <div class="stat total-stat">
      <div class="num" id="stat-total">–</div>
      <div class="label">Cohort Size</div>
    </div>
    <div class="stat day-stat">
      <div class="num" id="stat-day">–</div>
      <div class="label">Day</div>
    </div>
  </div>

  <div id="content">
    <div class="empty">Loading results…</div>
  </div>

  <footer>
    Auto-refreshes every 20s &nbsp;·&nbsp; reads <code>submissions/dayN.json</code> from each student's GitHub fork
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
